<svg width="32" height="32" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="saffronGradient" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#FF8C00" />
      <stop offset="100%" stop-color="#FF6B35" />
    </radialGradient>
    
    <radialGradient id="goldGradient" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#FFD700" />
      <stop offset="100%" stop-color="#FFA500" />
    </radialGradient>
    
    <radialGradient id="maroonGradient" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#8B0000" />
      <stop offset="100%" stop-color="#A0522D" />
    </radialGradient>
  </defs>
  
  <!-- Outer Circle -->
  <circle cx="50" cy="50" r="45" fill="url(#saffronGradient)" stroke="#FFD700" stroke-width="2"/>
  
  <!-- Middle Circle -->
  <circle cx="50" cy="50" r="35" fill="url(#goldGradient)" stroke="#FF8C00" stroke-width="1"/>
  
  <!-- Inner Circle -->
  <circle cx="50" cy="50" r="25" fill="url(#maroonGradient)" stroke="#FFD700" stroke-width="1"/>
  
  <!-- Om Symbol -->
  <text x="50" y="58" text-anchor="middle" font-size="20" fill="white" font-family="serif" font-weight="bold">ॐ</text>
  
  <!-- Decorative Elements -->
  <circle cx="75" cy="25" r="4" fill="#FFD700" opacity="0.8"/>
  <circle cx="25" cy="75" r="3" fill="#FF8C00" opacity="0.7"/>
</svg>
